<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <meta name="description" content="view all recorded expenses and purchases for Bricks House 48 Apartment">
    <link rel="stylesheet" href="style.css">
    <title>EasyBooks-Expenses & Purchases</title>
</head>
<body class="dashboard-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h2>EasyBooks</h2>
        </div>
        <nav class="sidebar-menu" aria-label="Primary navigation">
            <a href="dashboard.html" class="menu-item active" aria-current="page">Rooms &amp; Bookings</a>
            <a href="bar-inventory.html" class="menu-item">Bar &amp; Inventory</a>
            <a href="expenses.html" class="menu-item">Expenses &amp; Purchases</a>
            <a href="payments.html" class="menu-item">Payments</a>
            <a href="attendance.html" class="menu-item">Staff Attendance</a>
            <a href="reports.html" class="menu-item">Reports &amp; Analytics</a>
        </nav>

        <div class="sidebar-footer">
            <p class="user-badge">Logged in as: <span id="currentUserName">Staff Account</span></p>
            <a href="index.html" class="logout-link">Logout</a>
        </div>

    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="main-content" id="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menuToggle", aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="sidebar" >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1>Staff Attendance &amp; Login Audits</h1>
            </header>
            <section class="card table-section">
                <div class="table-toolbar">
                    <h2>all Staff Attendance Records</h2>
                    <div class="search-control">
                        <label for="attendance-search" class="sr-only">Search Staff Attendance by name</label>
                        <input type="text" id="attendance-search" class="search-input" placeholder="Search by Staff Name, Role, or Date">
                    </div>
                </div>
                <div class="table-container">
                    <table class="table-responsive">
                        <thead>
                            <tr>
                                <th>Staff Name</th>
                                <th>Role</th>
                                <th>Date &amp; Time</th>
                                <th>GPS Location</th>
                                <th>Device / Browser Info</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Attendance rows will be populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>
    <script src="app.js" defer></script>
</body>
</html>
